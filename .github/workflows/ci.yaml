name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main] 

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps: 
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24    
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check-types
      - run: pnpm build

